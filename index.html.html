<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Invertia: Reverse Control Runner</title>
<style>
  body { margin: 0; overflow: hidden; background-color: #050510; color: white; font-family: 'Courier New', Courier, monospace; touch-action: none; }
  canvas { display: block; }
  #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: center; align-items: center; }
  .hidden { display: none !important; }
  h1 { font-size: 3rem; text-shadow: 0 0 10px #0ff; margin-bottom: 10px; text-align: center;}
  p { font-size: 1.2rem; text-align: center; max-width: 600px; margin: 10px; }
  button { pointer-events: auto; padding: 15px 30px; font-size: 1.5rem; background: transparent; color: #0ff; border: 2px solid #0ff; box-shadow: 0 0 10px #0ff, inset 0 0 10px #0ff; cursor: pointer; text-transform: uppercase; margin-top: 20px; transition: 0.2s; }
  button:hover { background: #0ff; color: #000; }
  #scoreBoard { position: absolute; top: 20px; left: 20px; font-size: 1.5rem; color: #fff; text-shadow: 0 0 5px #fff; }
  #glitchWarning { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; color: #f00; text-shadow: 0 0 10px #f00; font-weight: bold; animation: blink 0.2s infinite; }
  @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
  #mobileControls { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; pointer-events: none; }
  .btn-group { display: flex; gap: 10px; pointer-events: auto; }
  .ctrl-btn { width: 60px; height: 60px; border-radius: 50%; background: rgba(0, 255, 255, 0.2); border: 2px solid rgba(0, 255, 255, 0.5); display: flex; justify-content: center; align-items: center; font-size: 24px; color: white; user-select: none; }
  .ctrl-btn:active { background: rgba(0, 255, 255, 0.5); }
  @media (min-width: 768px) { #mobileControls { display: none; } }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="scoreBoard">Score: <span id="scoreVal">0</span></div>
<div id="glitchWarning" class="hidden">GLITCH IMMINENT</div>

<div id="ui">
  <div id="startScreen">
    <h1>INVERTIA</h1>
    <p>Use Left/Right Arrows to move. Space to Jump.</p>
    <p style="color: #ff0055; font-weight: bold; text-shadow: 0 0 5px #ff0055;">Watch out for the GLITCH. When the screen turns red, your Left/Right controls are REVERSED!</p>
    <button id="startBtn">Start Game</button>
  </div>
  <div id="gameOverScreen" class="hidden">
    <h1 style="color: #ff0055; text-shadow: 0 0 10px #ff0055;">SYSTEM FAILURE</h1>
    <p>Final Score: <span id="finalScoreVal">0</span></p>
    <button id="restartBtn" style="color: #ff0055; border-color: #ff0055; box-shadow: 0 0 10px #ff0055, inset 0 0 10px #ff0055;">Reboot</button>
  </div>
</div>

<div id="mobileControls">
  <div class="btn-group">
    <div class="ctrl-btn" id="btnLeft">◄</div>
    <div class="ctrl-btn" id="btnRight">►</div>
  </div>
  <div class="btn-group">
    <div class="ctrl-btn" id="btnJump">▲</div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const ui = document.getElementById('ui');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const scoreVal = document.getElementById('scoreVal');
const finalScoreVal = document.getElementById('finalScoreVal');
const glitchWarning = document.getElementById('glitchWarning');

const keys = { left: false, right: false, jump: false };

const bindTouch = (id, key) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
    el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
};
bindTouch('btnLeft', 'left');
bindTouch('btnRight', 'right');
bindTouch('btnJump', 'jump');

window.addEventListener('keydown', (e) => {
    if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
    if(e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
    if(e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') keys.jump = true;
});
window.addEventListener('keyup', (e) => {
    if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
    if(e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
    if(e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') keys.jump = false;
});
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

const GRAVITY = 0.6;
const NORMAL_COLOR = '#00ffff';
const WARNING_COLOR = '#ffffff';
const GLITCHED_COLOR = '#ff0055';
let GAME_SPEED = 4;

let isPlaying = false;
let score = 0;
let platforms = [];
let particles = [];
let frameCount = 0;

let glitchState = 0; // 0: Normal, 1: Warning, 2: Glitched
let glitchTimer = 0;
let nextGlitchTime = 300;

class Player {
    constructor() {
        this.width = 30;
        this.height = 30;
        this.reset();
    }
    reset() {
        this.x = canvas.width / 4;
        this.y = canvas.height / 2;
        this.vx = 0;
        this.vy = 0;
        this.speed = 6;
        this.jumpPower = -12;
        this.isGrounded = false;
    }
    update() {
        let moveDir = 0;
        if(keys.left) moveDir -= 1;
        if(keys.right) moveDir += 1;
        
        if(glitchState === 2) moveDir *= -1; // REVERSE CONTROLS!

        this.vx = moveDir * this.speed;

        if(keys.jump && this.isGrounded) {
            this.vy = this.jumpPower;
            this.isGrounded = false;
            createParticles(this.x + this.width/2, this.y + this.height, 10, getColor());
        }

        this.vy += GRAVITY;
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0) this.x = 0;
        if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;

        if(this.y > canvas.height) gameOver();

        this.isGrounded = false;
    }
    draw() {
        ctx.shadowBlur = 15;
        ctx.shadowColor = getColor();
        ctx.fillStyle = getColor();
        ctx.fillRect(this.x, this.y, this.width, this.height);
        ctx.shadowBlur = 0;
    }
}

class Platform {
    constructor(x, y, w, h, isMoving = false) {
        this.x = x;
        this.y = y;
        this.width = w;
        this.height = h;
        this.isMoving = isMoving;
        this.moveDir = Math.random() > 0.5 ? 1 : -1;
        this.moveSpeed = 2;
    }
    update() {
        this.x -= GAME_SPEED; 
        if (this.isMoving) {
            this.y += this.moveDir * this.moveSpeed;
            if (this.y < canvas.height/3 || this.y > canvas.height - 100) this.moveDir *= -1;
        }
    }
    draw() {
        ctx.fillStyle = '#111';
        ctx.strokeStyle = getColor();
        ctx.lineWidth = 2;
        ctx.shadowBlur = 5;
        ctx.shadowColor = getColor();
        ctx.fillRect(this.x, this.y, this.width, this.height);
        ctx.strokeRect(this.x, this.y, this.width, this.height);
        ctx.shadowBlur = 0;
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.life = 1;
        this.decay = Math.random() * 0.05 + 0.02;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
    }
    draw() {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, 4, 4);
        ctx.globalAlpha = 1;
    }
}

const player = new Player();

function getColor() {
    if(glitchState === 0) return NORMAL_COLOR;
    if(glitchState === 1) return WARNING_COLOR;
    return GLITCHED_COLOR;
}

function createParticles(x, y, count, color) {
    for(let i=0; i<count; i++) particles.push(new Particle(x, y, color));
}

function spawnPlatform() {
    const minW = 120;
    const maxW = 250;
    const w = Math.random() * (maxW - minW) + minW;
    const h = 20;
    const x = canvas.width;
    
    let y;
    if (platforms.length > 0) {
        const last = platforms[platforms.length - 1];
        const yOffset = (Math.random() - 0.5) * 250; 
        y = last.y + yOffset;
        y = Math.max(150, Math.min(canvas.height - 100, y)); 
    } else {
        y = canvas.height / 2 + 100;
    }

    const isMoving = Math.random() > 0.7; 
    platforms.push(new Platform(x, y, w, h, isMoving));
}

function checkCollisions() {
    for(let plat of platforms) {
        if (player.x < plat.x + plat.width && player.x + player.width > plat.x &&
            player.y < plat.y + plat.height && player.y + player.height > plat.y) {
            
            const playerBottom = player.y + player.height;
            const prevPlayerBottom = playerBottom - player.vy;
            
            if (prevPlayerBottom <= plat.y + 10) {
                player.isGrounded = true;
                player.y = plat.y - player.height;
                player.vy = 0;
                player.x -= GAME_SPEED;
            } else if (player.x + player.width > plat.x && player.x < plat.x) {
                player.x = plat.x - player.width;
            }
        }
    }
}

function handleGlitchMechanic() {
    glitchTimer++;
    if (glitchState === 0) {
        if (glitchTimer >= nextGlitchTime) {
            glitchState = 1; glitchTimer = 0;
            glitchWarning.classList.remove('hidden');
        }
    } else if (glitchState === 1) {
        if (glitchTimer >= 60) {
            glitchState = 2; glitchTimer = 0;
            glitchWarning.classList.add('hidden');
            document.body.style.backgroundColor = '#2a0005';
        }
    } else if (glitchState === 2) {
        if (glitchTimer >= 300) {
            glitchState = 0; glitchTimer = 0;
            nextGlitchTime = Math.random() * 300 + 200;
            document.body.style.backgroundColor = '#050510';
        }
    }
}

function resetGame() {
    player.reset();
    platforms = [];
    particles = [];
    score = 0;
    frameCount = 0;
    GAME_SPEED = 4;
    glitchState = 0;
    glitchTimer = 0;
    nextGlitchTime = 300;
    document.body.style.backgroundColor = '#050510';
    glitchWarning.classList.add('hidden');
    platforms.push(new Platform(100, canvas.height/2 + 100, 800, 20));
}

function gameOver() {
    isPlaying = false;
    createParticles(player.x, player.y, 50, getColor());
    gameOverScreen.classList.remove('hidden');
    startScreen.classList.add('hidden');
    finalScoreVal.innerText = Math.floor(score);
}

function update() {
    if (!isPlaying) return;

    ctx.fillStyle = 'rgba(5, 5, 16, 0.4)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    frameCount++;
    score += 0.1;
    scoreVal.innerText = Math.floor(score);

    if (frameCount % 600 === 0) GAME_SPEED += 0.5;

    handleGlitchMechanic();
    player.update();
    checkCollisions();
    player.draw();

    if (platforms.length === 0 || platforms[platforms.length - 1].x < canvas.width - 250) spawnPlatform();

    for (let i = platforms.length - 1; i >= 0; i--) {
        const p = platforms[i];
        p.update();
        p.draw();
        if (p.x + p.width < 0) platforms.splice(i, 1);
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.update();
        p.draw();
        if (p.life <= 0) particles.splice(i, 1);
    }

    requestAnimationFrame(update);
}

document.getElementById('startBtn').addEventListener('click', () => {
    startScreen.classList.add('hidden');
    resetGame();
    isPlaying = true;
    update();
});

document.getElementById('restartBtn').addEventListener('click', () => {
    gameOverScreen.classList.add('hidden');
    resetGame();
    isPlaying = true;
    update();
});

ctx.fillStyle = '#050510';
ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
